<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="alerts">
<div class="alerts-wrap" x-data="alertManager()" x-init="startAutoDismiss()">
    <template x-for="(alert, index) in alerts" :key="index">
        <div x-show="alert.visible"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="alert relative overflow-hidden"
             :class="alert.type">
            <div class="flex items-start justify-between gap-3">
                <div class="flex items-start gap-2.5 min-w-0">
                    <span class="material-symbols-outlined mt-0.5 text-[18px] shrink-0"
                          x-text="alert.icon"></span>
                    <span class="text-sm font-semibold leading-relaxed" x-text="alert.message"></span>
                </div>
                <button @click="dismiss(index)"
                        type="button"
                        class="shrink-0 flex h-7 w-7 items-center justify-center rounded-lg transition hover:bg-black/8 focus:outline-none"
                        aria-label="Dismiss">
                    <span class="material-symbols-outlined text-[16px]">close</span>
                </button>
            </div>
            <div class="absolute bottom-0 left-0 h-[3px] rounded-full transition-all duration-100 ease-linear"
                 :class="alert.barClass"
                 :style="'width: ' + alert.progress + '%'"></div>
        </div>
    </template>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    function alertManager() {
        const rawAlerts = [];
        /*[# th:if="${successMessage}"]*/
        rawAlerts.push({ message: /*[[${successMessage}]]*/ '', type: 'alert-success', icon: 'check_circle', barClass: 'bg-emerald-500/40' });
        /*[/]*/
        /*[# th:if="${errorMessage}"]*/
        rawAlerts.push({ message: /*[[${errorMessage}]]*/ '', type: 'alert-error', icon: 'error', barClass: 'bg-red-500/40' });
        /*[/]*/
        /*[# th:if="${warningMessage}"]*/
        rawAlerts.push({ message: /*[[${warningMessage}]]*/ '', type: 'alert-warning', icon: 'warning', barClass: 'bg-amber-500/40' });
        /*[/]*/
        /*[# th:if="${param.error}"]*/
        rawAlerts.push({ message: 'Invalid username or password.', type: 'alert-error', icon: 'error', barClass: 'bg-red-500/40' });
        /*[/]*/
        /*[# th:if="${param.logout}"]*/
        rawAlerts.push({ message: 'You have been logged out successfully.', type: 'alert-success', icon: 'check_circle', barClass: 'bg-emerald-500/40' });
        /*[/]*/

        return {
            alerts: rawAlerts.map(a => ({ ...a, visible: true, progress: 100 })),
            timers: [],

            startAutoDismiss() {
                const duration = 6000;
                const tick = 50;
                this.alerts.forEach((alert, index) => {
                    const steps = duration / tick;
                    let step = 0;
                    const interval = setInterval(() => {
                        step++;
                        alert.progress = Math.max(0, 100 - (step / steps) * 100);
                        if (step >= steps) {
                            clearInterval(interval);
                            this.dismiss(index);
                        }
                    }, tick);
                    this.timers.push(interval);
                });
            },

            dismiss(index) {
                if (this.alerts[index]) {
                    this.alerts[index].visible = false;
                    if (this.timers[index]) {
                        clearInterval(this.timers[index]);
                    }
                }
            }
        };
    }
    /*]]>*/
</script>
</th:block>
