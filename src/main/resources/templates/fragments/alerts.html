<div xmlns:th="http://www.thymeleaf.org" class="alerts-wrap" th:fragment="alerts">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert alert-error" th:if="${errorCode}" th:text="${errorCode}"></div>
    <div class="alert alert-error" th:if="${errorDetails}" th:text="${errorDetails}"></div>
    <div class="alert alert-error" th:if="${param.error}">Invalid username or password.</div>
    <div class="alert alert-success" th:if="${param.logout}">You have been logged out successfully.</div>
</div>
