<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="header">
<body>
<header class="site-header shared-workspace-header">
    <div class="container">
        <div class="dashboard-topbar shared-topbar">
            <a class="dashboard-brand" th:href="@{/dashboard}">
                <img class="dashboard-brand-icon" th:src="@{/img/brand-mark.svg}" alt="Java Code Grader logo">
                <div class="dashboard-brand-copy">
                    <span class="dashboard-brand-title">Java Code Grader</span>
                    <span class="dashboard-brand-subtitle">Teacher Workspace</span>
                </div>
            </a>

            <div class="dashboard-topbar-actions">
                <nav class="dashboard-nav" aria-label="Primary navigation">
                    <a class="dashboard-nav-link" th:href="@{/dashboard}">
                        <span class="dashboard-nav-dot"></span>
                        <span>Dashboard</span>
                    </a>
                    <a class="dashboard-nav-link" th:href="@{/semesters}">
                        <img th:src="@{/img/icon-semester.svg}" alt="">
                        <span>Semester</span>
                    </a>
                </nav>

                <form th:action="@{/logout}" method="post" class="dashboard-logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="dashboard-logout" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</header>
</body>
</html>
