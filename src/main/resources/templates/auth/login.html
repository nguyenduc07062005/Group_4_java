<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
<div class="login-page">
    <div class="login-box">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="login-card">
            <h1 class="page-title">Teacher Login</h1>
            <p class="page-subtitle">Sign in to manage assignments and grading.</p>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input id="username" name="username" type="text" class="form-input" autocomplete="username" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" name="password" type="password" class="form-input" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Sign in</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
