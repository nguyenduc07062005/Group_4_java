<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-white text-stone-950">
<div class="min-h-screen flex flex-col">
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="flex-1 mx-auto w-full max-w-[1200px] px-4 py-8 lg:px-8">
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- ═══ UNIFIED FORM SHELL ═══ -->
        <section class="overflow-hidden rounded-[32px] border border-stone-200 bg-white shadow-[0_20px_50px_rgba(0,0,0,0.04)]">
            
            <!-- Hero Header -->
            <div class="relative border-b border-stone-100 bg-gradient-to-br from-[#001f6b] via-[#0047AB] to-[#0071e3] px-8 py-10 text-white lg:px-12">
                <!-- Subtle grid overlay -->
                <div class="absolute inset-0 opacity-[0.07]" 
                     style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 30px 30px;">
                </div>
                
                <div class="relative z-10 max-w-3xl">
                    <div class="mb-4 flex items-center gap-2 text-[0.7rem] font-bold uppercase tracking-[0.25em] text-blue-100/90">
                        <span class="h-1.5 w-1.5 rounded-full bg-blue-400"></span>
                        <span th:text="${editMode ? 'Workspace Maintenance' : 'New Workspace'}">New Workspace</span>
                    </div>
                    <h1 class="font-['DM_Serif_Display'] text-5xl leading-tight tracking-[-0.03em]">
                        <span th:text="${editMode ? 'Edit Semester' : 'Create Semester'}">Create Semester</span>
                    </h1>
                    <p class="mt-4 text-base leading-relaxed text-blue-50/80" th:text="${pageSubtitle}">
                        Establish the academic timeframe for your courses and assignments.
                    </p>
                </div>
            </div>

            <!-- Form Body -->
            <div class="px-8 py-8 lg:px-12 lg:py-12">
                <form th:action="${editMode} ? @{/semesters/{id}/edit(id=${semesterId})} : @{/semesters/create}"
                      th:object="${semesterForm}"
                      method="post"
                      class="max-w-4xl space-y-10">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="rounded-2xl border border-red-200 bg-red-50 px-5 py-4 text-sm text-red-700" th:if="${#fields.hasGlobalErrors()}">
                        <p class="flex items-center gap-2" th:each="error : ${#fields.globalErrors()}">
                            <span class="material-symbols-outlined text-[20px]">error</span>
                            <span th:text="${error}">Error</span>
                        </p>
                    </div>

                    <!-- Input Grid -->
                    <div class="grid gap-x-10 gap-y-8 md:grid-cols-2">
                        <!-- Code -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-[0.68rem] font-bold uppercase tracking-[0.2em] text-stone-400" for="code">
                                <span class="material-symbols-outlined text-[18px]">tag</span>
                                Semester Code
                            </label>
                            <input class="w-full rounded-2xl border border-stone-200 bg-stone-50/50 px-5 py-4 font-['JetBrains_Mono'] text-lg transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 outline-none" 
                                   id="code" th:field="*{code}" type="text" placeholder="SP26">
                            <p class="text-[0.68rem] text-stone-500">Must be unique (e.g., SP26, SU25)</p>
                            <div class="text-xs font-semibold text-red-500" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
                        </div>

                        <!-- Name -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-[0.68rem] font-bold uppercase tracking-[0.2em] text-stone-400" for="name">
                                <span class="material-symbols-outlined text-[18px]">title</span>
                                Descriptive Name
                            </label>
                            <input class="w-full rounded-2xl border border-stone-200 bg-stone-50/50 px-5 py-4 text-lg transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 outline-none" 
                                   id="name" th:field="*{name}" type="text" placeholder="Spring 2026">
                            <p class="text-[0.68rem] text-stone-500">Public name of the semester</p>
                            <div class="text-xs font-semibold text-red-500" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <!-- Date Start -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-[0.72rem] font-bold uppercase tracking-[0.16em] text-stone-400" for="startDate">
                                <span class="material-symbols-outlined text-[18px]">calendar_today</span>
                                Start Date
                            </label>
                            <input class="w-full rounded-2xl border border-stone-200 bg-stone-50/50 px-5 py-4 text-lg transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 outline-none" 
                                   id="startDate" th:field="*{startDate}" type="date">
                            <div class="text-xs font-semibold text-red-500" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                        </div>

                        <!-- Date End -->
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-[0.68rem] font-bold uppercase tracking-[0.2em] text-stone-400" for="endDate">
                                <span class="material-symbols-outlined text-[18px]">event_repeat</span>
                                Finalization Date
                            </label>
                            <input class="w-full rounded-2xl border border-stone-200 bg-stone-50/50 px-5 py-4 text-lg transition focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 outline-none" 
                                   id="endDate" th:field="*{endDate}" type="date">
                            <div class="text-xs font-semibold text-red-500" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="flex items-center justify-between border-t border-stone-100 pt-10">
                        <a class="flex items-center gap-2 text-sm font-semibold text-stone-500 transition hover:text-stone-900"
                           th:href="${editMode} ? @{/semesters/{id}(id=${semesterId})} : @{/semesters}">
                            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                            Cancel and Return
                        </a>

                        <button class="flex items-center gap-3 rounded-2xl bg-gradient-to-r from-[#003da5] to-[#0071e3] px-8 py-4 text-base font-bold text-white shadow-lg shadow-blue-600/20 transition hover:scale-[1.02] active:scale-95" type="submit">
                            <span class="material-symbols-outlined">save</span>
                            <span th:text="${submitLabel}">Save Semester</span>
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
