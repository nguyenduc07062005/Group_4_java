spring.datasource.url=jdbc:h2:mem:javagrader;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.thymeleaf.cache=false
spring.flyway.enabled=true
app.storage.submissions-root=./target/test-submissions
app.storage.grading-root=./target/test-grading
app.batch.worker-count=2
app.batch.queue-capacity=8
app.grading.timeout-millis=1500

